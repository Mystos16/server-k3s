# itzg/minecraft-server. World data on tank; exposed via a LoadBalancer
# (k3s ServiceLB) on port 25565 — not through Traefik/cloudflared.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minecraft
  namespace: games
  labels:
    app: minecraft
spec:
  serviceName: minecraft
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      containers:
        - name: minecraft
          image: itzg/minecraft-server:java21
          ports:
            - name: mc
              containerPort: 25565
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: PAPER
            - name: MEMORY
              value: "4G"
            - name: TZ
              value: Europe/Amsterdam
          readinessProbe:
            exec:
              command: ["mc-health"]
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /tank/app/minecraft
            type: DirectoryOrCreate
