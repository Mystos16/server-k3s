apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reflector: mirrors secrets/configmaps across namespaces (useful for sharing
# TLS certs or the authelia session secret to multiple namespaces).
namespace: infra

resources:
  - https://github.com/emberstack/kubernetes-reflector/releases/download/v9.0.322/reflector.yaml
