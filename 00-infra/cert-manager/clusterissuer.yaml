# Let's Encrypt DNS-01 issuer using Cloudflare.
# Requires the SealedSecret 'cloudflare-api-token' in the cert-manager namespace
# with key 'api-token' (a Cloudflare token with Zone:DNS:Edit for neleoz.com).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@neleoz.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - neleoz.com
