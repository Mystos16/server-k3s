apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# cert-manager (CRDs + controller). Kept in infra per your request.
# After apply, create the ClusterIssuer (clusterissuer.yaml) — it needs the
# Cloudflare API token SealedSecret to exist first.
resources:
  - https://github.com/cert-manager/cert-manager/releases/download/v1.15.3/cert-manager.yaml
  - clusterissuer.yaml
