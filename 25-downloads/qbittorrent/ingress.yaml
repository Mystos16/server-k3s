# Internal only — qbittorrent is never exposed publicly.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbittorrent
  namespace: downloads
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: downloads-authelia@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - qbittorrent.neleoz.com
      secretName: qbittorrent-tls
  rules:
    - host: qbittorrent.neleoz.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qbittorrent
                port:
                  number: 80
