# BambuStudio desktop-in-browser (github.com/linuxserver/docker-bambustudio).
# HTTPS on 3001 is required for full functionality; 3000 is plain HTTP.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bambustudio
  namespace: apps
  labels:
    app: bambustudio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bambustudio
  template:
    metadata:
      labels:
        app: bambustudio
    spec:
      containers:
        - name: bambustudio
          image: lscr.io/linuxserver/bambustudio:latest
          ports:
            - name: http
              containerPort: 3000
            - name: https
              containerPort: 3001
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Amsterdam
            - name: DARK_MODE
              value: "true"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: config
          hostPath:
            path: /tank/app/bambustudio
            type: DirectoryOrCreate
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
